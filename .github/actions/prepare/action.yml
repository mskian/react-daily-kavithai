description: Prepares the repo for a typical CI job

name: Prepare

runs:
  using: composite

  steps:
    - uses: pnpm/action-setup@v6.0.8
      with:
        version: 11.2.2

    - uses: actions/setup-node@v6.4.0
      with:
        node-version: '24.15.0'
        cache: pnpm

    - name: Install dependencies
      run: |
        pnpm install
      shell: bash
